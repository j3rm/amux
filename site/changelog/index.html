<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — amux</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="description" content="What's new in amux — release notes and recent changes.">
  <meta property="og:title" content="Changelog — amux">
  <meta property="og:description" content="What's new in amux — release notes and recent changes.">
  <meta property="og:url" content="https://amux.io/changelog/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  </head>
<body>
<button id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">☀</button>
<header>
  <a href="/" class="home">amux</a>
  <span class="sep">/</span>
  <span style="color:var(--muted);font-size:0.9rem;">Changelog</span>
</header>
<main>
  <h1 class="page-title">Changelog</h1>
  <p class="page-sub">Recent changes, automatically updated from <a href="https://github.com/mixpeek/amux/commits/main" target="_blank" rel="noopener">GitHub commits</a>.</p>

  <div class="filters" id="filters">
    <button class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-pill" data-filter="feat" onclick="setFilter('feat',this)">Features</button>
    <button class="filter-pill" data-filter="fix" onclick="setFilter('fix',this)">Bug fixes</button>
    <button class="filter-pill" data-filter="docs" onclick="setFilter('docs',this)">Docs</button>
  </div>

  <div id="loading">Loading changelog…</div>
  <div id="error" style="display:none;"></div>
  <div id="empty" style="display:none;">No entries match this filter.</div>
  <div id="entries"></div>
</main>

<script>
  var allEntries = [];
  var activeFilter = 'all';

  function toggleTheme() {
    var cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur === 'light' ? 'dark' : 'light');
    localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));
  }
  (function() {
    var t = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', t);
  })();

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    renderEntries();
  }

  function typeBadge(type) {
    var t = (type || 'chore').toLowerCase();
    return '<span class="type-badge type-' + t + '">' + t + '</span>';
  }

  function renderEntries() {
    var container = document.getElementById('entries');
    var emptyEl = document.getElementById('empty');
    var filtered = activeFilter === 'all' ? allEntries : allEntries.filter(function(e) { return e.type === activeFilter; });
    if (!filtered.length) { container.innerHTML = ''; emptyEl.style.display = ''; return; }
    emptyEl.style.display = 'none';
    container.innerHTML = filtered.map(function(e) {
      var tags = (e.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
      var desc = e.description ? '<p class="entry-desc">' + e.description + '</p>' : '';
      var tagsHtml = tags ? '<div class="entry-tags">' + tags + '</div>' : '';
      var ghUrl = 'https://github.com/mixpeek/amux/commit/' + e.hash;
      return '<div class="entry" data-type="' + (e.type||'') + '">' +
        '<div class="entry-date-col">' +
          '<div class="entry-date">' + (e.date || '') + '</div>' +
          '<a href="' + ghUrl + '" target="_blank" rel="noopener" class="entry-hash" title="View commit">' + (e.short || '') + '</a>' +
        '</div>' +
        '<div class="entry-body">' +
          '<div class="entry-header">' + typeBadge(e.type) + '<span class="entry-title">' + e.title + '</span></div>' +
          desc + tagsHtml +
        '</div>' +
      '</div>';
    }).join('');
  }

  fetch('/changelog/notes.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('loading').style.display = 'none';
      allEntries = data;
      renderEntries();
    })
    .catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = '';
      el.textContent = 'Failed to load changelog: ' + err.message;
    });
</script>
</body>
</html>
