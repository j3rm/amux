<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amux — Release Notes</title>
<meta name="description" content="amux release notes and changelog. Every commit, every feature, every fix.">
<meta property="og:title" content="amux Release Notes">
<meta property="og:description" content="Changelog for amux — the Claude session manager. Features, fixes, and everything in between.">
<meta property="og:url" content="https://amux.io/release-notes/">
<link rel="canonical" href="https://amux.io/release-notes/">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="rn-header">
  <div class="rn-logo">
    <div class="rn-logo-mark">a</div>
    <a href="/" class="rn-logo-name">amux</a>
    <span class="rn-logo-sep">/</span>
    <span class="rn-logo-sub">release notes</span>
  </div>
  <h1 class="rn-title">Release Notes</h1>
  <p class="rn-subtitle">Every commit. Every feature. Every fix.</p>
</header>
<div class="rn-content">
  <div id="rn-list"><div class="rn-spinner">Loading&hellip;</div></div>
</div>
<script>
var GH_RAW = 'https://raw.githubusercontent.com/mixpeek/amux/main/docs/release-notes/videos/';
var GH_COMMIT = 'https://github.com/mixpeek/amux/commit/';

function typeBadge(type) {
  var cls = type === 'feat' ? 'feat' : type === 'fix' ? 'fix' : 'chore';
  return '<span class="rn-badge rn-badge-' + cls + '">' + type + '</span>';
}

function renderEntry(n) {
  var tags = (n.tags || []).map(function(t) { return '<span class="rn-tag">' + t + '</span>'; }).join('');
  var video = n.video
    ? '<div class="rn-video-wrap"><video controls preload="none"><source src="' + GH_RAW + n.video + '" type="video/mp4"></video></div>'
    : '<div class="rn-video-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>Video coming soon</span></div>';
  return '<article class="rn-entry">' +
    '<div class="rn-entry-meta">' +
      '<span class="rn-date">' + (n.date || '') + '</span>' +
      typeBadge(n.type) +
      tags +
      '<a class="rn-commit" href="' + GH_COMMIT + n.hash + '" target="_blank" rel="noopener">' + (n.short || '') + '</a>' +
    '</div>' +
    '<h2 class="rn-entry-title">' + n.title + '</h2>' +
    (n.description ? '<p class="rn-entry-desc">' + n.description + '</p>' : '') +
    video +
    '</article>';
}

fetch('/changelog/notes.json?v=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var enriched = data.filter(function(n) { return n.description && n.description.trim(); });
    var list = document.getElementById('rn-list');
    if (!enriched.length) {
      list.innerHTML = '<div class="rn-empty">No release notes yet.</div>';
      return;
    }
    list.innerHTML = enriched.map(renderEntry).join('');
  })
  .catch(function() {
    document.getElementById('rn-list').innerHTML = '<div class="rn-empty">Failed to load release notes.</div>';
  });
</script>
</body>
</html>
